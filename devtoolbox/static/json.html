<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON 自动修复与格式化 - DevToolbox</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260714-1" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-nav">
        <a class="brand" href="/">
          <span class="brand-mark">DT</span>
          <span>DevToolbox</span>
        </a>
        <nav class="nav-links" aria-label="工具导航">
          <a class="active" href="/tools/json">JSON 修复</a>
          <a href="/tools/text-diff">文本对比</a>
          <a href="/tools/markdown">Markdown 渲染</a>
          <a href="/tools/timestamp">时间戳转换</a>
        </nav>
      </header>

      <section class="tool-header">
        <div>
          <p class="eyebrow">json repair</p>
          <h1>JSON 自动修复与格式化</h1>
          <p>左侧粘贴原始内容，右侧自动修复；格式化视图支持层级折叠和字号调整。</p>
        </div>
        <div class="toolbar" aria-label="JSON 工具栏">
          <label class="control-field" for="fontSizeInput">
            字号
            <input id="fontSizeInput" type="number" min="11" max="24" step="1" value="14" />
          </label>
        </div>
      </section>

      <section id="jsonEditorGrid" class="editor-grid" aria-label="JSON 编辑区">
        <article class="workspace-card">
          <div class="workspace-title">
            <span>原始输入</span>
            <div class="workspace-actions">
              <button id="copyInputButton" class="ghost-button" type="button">复制</button>
              <button id="wrapInputButton" class="ghost-button" type="button" aria-pressed="false">换行</button>
              <button id="clearInputButton" class="ghost-button" type="button">清空</button>
            </div>
          </div>
          <div class="editor-shell input-shell">
            <pre id="rawLineNumbers" class="line-numbers" aria-hidden="true">1</pre>
            <textarea id="rawInput" wrap="off" spellcheck="false" placeholder="在这里粘贴可能不规范的 JSON / Python dict 文本"></textarea>
          </div>
        </article>

        <article class="workspace-card">
          <div class="workspace-title">
            <span>修复 / 格式化结果</span>
            <div id="resultActions" class="workspace-actions">
              <span id="resultModeLabel" class="soft-badge">修复视图</span>
              <button id="formatButton" class="button primary" type="button" data-mode="repaired">格式化</button>
              <button id="copyResultButton" class="ghost-button" type="button">复制</button>
              <button id="wrapResultButton" class="ghost-button" type="button" aria-pressed="false">换行</button>
            </div>
          </div>
          <div id="resultViewer" class="editor-shell result-viewer" role="region" aria-label="修复和格式化结果">
            <div id="resultOutput" class="code-output" tabindex="0" aria-label="修复和格式化后的 JSON"></div>
          </div>
        </article>
      </section>

      <p id="status" class="status" role="status">等待输入</p>
    </main>

    <script src="/static/json_tool.js?v=20260714-1"></script>
  </body>
</html>
